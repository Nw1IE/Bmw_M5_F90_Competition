name: CI 

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Project Structure Check
        run: |
          echo "Проверка структуры проекта..."
          if [ ! -f "index.html" ]; then
            echo "Ошибка: Главный файл index.html не найден!"
            exit 1
          fi
          echo "Главный файл на месте. Проект готов к развертыванию."

      - name: HTML Validation Test
        run: |
          echo "Запуск тестов кода..."
          # Простая проверка на наличие базовой разметки
          grep -q "<!DOCTYPE html>" index.html && grep -q "</html>" index.html
          if [ $? -eq 0 ]; then
            echo "[PASS] Базовая структура HTML корректна."
          else
            echo "[FAIL] Файл index.html поврежден или имеет неверную структуру."
            exit 1
          fi

      - name: Success Notification
        if: success()
        run: echo "Статус: ЗЕЛЕНЫЙ. Все проверки пройдены, проект стабилен."

      - name: Failure Notification
        if: failure()
        run: echo "Статус: КРАСНЫЙ. Обнаружены ошибки в коде или структуре!"