name: CI 

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    default:
      run:
        working-directory: m5_landing

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup main.rs
        run: |
          echo "Проверка структуры проекта..."
          if [ ! -f "index.html" ]; then
            echo "Ошибка: Файл index.html не найден!"
            exit 1
          fi
          echo "Файл на месте. Проект готов к развертыванию."

      - name: Test
        run: |
          echo "Запуск тестов"
          # Простая проверка на наличие базовой разметки
          grep -q "<!DOCTYPE html>" index.html && grep -q "</html>" index.html
          if [ $? -eq 0 ]; then
            echo "[PASS] Базовая структура HTML корректна."
          else
            echo "[FAIL] Файл index.html поврежден или имеет неверную структуру."
            exit 1
          fi

      - name: Yes
        if: success()
        run: echo "Статус: Green. Все проверки пройдены, проект стабилен."

      - name: No
        if: failure()
        run: echo "Статус: Rrd. Обнаружены ошибки в коде или структуре!"